name: Rollback

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'ECR image tag to deploy (e.g. v1.2.0 or main-abc1234)'
        required: true
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - qa
          - uat
          - prd

jobs:
  rollback:
    name: Rollback ${{ inputs.environment }} → ${{ inputs.image-tag }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}  # dynamically picks the GitHub Environment
                                            # prd/uat still require manual approval as configured
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify image exists in ECR
        env:
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          aws ecr describe-images \
            --repository-name $REPOSITORY \
            --image-ids imageTag=$IMAGE_TAG \
            --query 'imageDetails[0].imageTags' \
            --output text || {
            echo "ERROR: image tag '$IMAGE_TAG' not found in ECR"
            exit 1
          }
          echo "Verified: $IMAGE_TAG exists in ECR"

      - name: Deploy
        env:
          IMAGE_TAG: ${{ inputs.image-tag }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          echo "Rolling back $ENVIRONMENT to $IMAGE_TAG..."
          # TODO: replace with your deployment command
          # e.g. aws ecs update-service --cluster $ENVIRONMENT --service my-app --force-new-deployment
