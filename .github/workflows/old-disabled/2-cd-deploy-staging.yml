name: 2. CD - Deploy to Staging (STG)

on:
  # Trigger manually or from a downstream event (e.g. integration test success webhook)
  workflow_dispatch:
    inputs:
      artifact_version:
        description: 'Alpha version to promote (e.g. v1.3.0-alpha.15)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────
  # 1. Promote alpha → beta
  # ─────────────────────────────────────────────
  promote-version:
    name: Promote Alpha → Beta
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.promote-stg.outputs.new-version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Promote to Beta (STG)
        id: promote-stg
        uses: anvaplus/github-actions-common/.github/actions/promote-version@main
        with:
          version: ${{ inputs.artifact_version }}
          promote-type: 'beta'
          tag-repo: 'true'

      - name: Report Promoted Version
        run: |
          echo "🔁 Promoted: ${{ inputs.artifact_version }} → ${{ steps.promote-stg.outputs.new-version }}"

  # ─────────────────────────────────────────────
  # 2. Re-tag image (same digest, new tag)
  # ─────────────────────────────────────────────
  retag-image:
    name: Retag Image for STG
    runs-on: ubuntu-latest
    needs: promote-version
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Retag Image (no rebuild)
        run: |
          SOURCE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.artifact_version }}"
          TARGET="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.promote-version.outputs.new-version }}"
          crane copy "$SOURCE" "$TARGET"
          echo "✅ Retagged: $SOURCE → $TARGET"

  # ─────────────────────────────────────────────
  # 3. Deploy to STG
  # ─────────────────────────────────────────────
  deploy-stg:
    name: Deploy to STG
    runs-on: ubuntu-latest
    needs: [ promote-version, retag-image ]
    environment:
      name: staging
      url: https://stg.example.com
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying ${{ needs.promote-version.outputs.new-version }} to STG..."
          # e.g. update Argo CD image tag / Helm values / kustomize overlay

      - name: Run STG Smoke Tests
        run: |
          echo "Running smoke tests against STG..."
          # curl / newman / pytest call here

      - name: Summary
        run: |
          echo "## 🟡 STG Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Source | \`${{ inputs.artifact_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Promoted To | \`${{ needs.promote-version.outputs.new-version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Staging |" >> $GITHUB_STEP_SUMMARY
