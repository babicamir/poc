name: 1. CI - Build and Integration

on:
  push:
    branches: [ main ]

permissions:
  contents: write       # needed to push git tags
  packages: write       # needed to push container images

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io

jobs:
  # ─────────────────────────────────────────────
  # 1. Version
  # ─────────────────────────────────────────────
  version:
    name: Generate Alpha Version
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.generate-version.outputs.new-version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required to see all historical tags for semver bump calculations

      - name: Generate next Alpha Version
        id: generate-version
        uses: anvaplus/github-actions-common/.github/actions/next-version@main
        with:
          version-type: 'alpha'
          tag-repo: 'true'

      - name: Report Generated Version
        run: |
          echo "✅ Generated integration build: ${{ steps.generate-version.outputs.new-version }}"

  # ─────────────────────────────────────────────
  # 2. Build & Push
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: version
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.version.outputs.new-version }}

      - name: Build and Push Image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.version.outputs.new-version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
