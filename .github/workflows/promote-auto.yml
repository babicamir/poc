name: Promote — Auto
run-name: "Promote [${{ inputs.target_env }}] ${{ github.sha }}"

# Flow:
#   qa  ← latest main SHA (auto)
#   uat ← lists recent qa  tags from ECR → auto-selects current qa  deployment
#   prd ← lists recent uat tags from ECR → auto-selects current uat deployment
#
# Optional: override source_tag to promote a specific previous version

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target environment"
        required: true
        type: choice
        options: [qa, uat, prd]
      source_tag:
        description: "Override source tag (leave empty to auto-use latest from source env)"
        required: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ${{ github.event.repository.name }}

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      source_tag: ${{ steps.resolve.outputs.source_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve source tag and list available tags
        id: resolve
        run: |
          REGISTRY="${{ steps.ecr_login.outputs.registry }}"
          TARGET="${{ inputs.target_env }}"

          # Manual override takes priority
          if [[ -n "${{ inputs.source_tag }}" ]]; then
            echo "source_tag=${{ inputs.source_tag }}" >> $GITHUB_OUTPUT
            echo "### Source tag (manual override)" >> $GITHUB_STEP_SUMMARY
            echo "- \`${{ inputs.source_tag }}\`" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Resolve source environment
          if [[ "$TARGET" == "qa"  ]]; then SOURCE_ENV="dev"; fi
          if [[ "$TARGET" == "uat" ]]; then SOURCE_ENV="qa";  fi
          if [[ "$TARGET" == "prd" ]]; then SOURCE_ENV="uat"; fi

          if [[ "$TARGET" == "qa" ]]; then
            # QA promotes the image currently deployed to DEV (full SHA stored by ci.yml)
            CURRENT=$(jq -r '.dev' deployments.json)
            SOURCE_TAG="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${CURRENT}"

            echo "### Available dev images (latest first)" >> $GITHUB_STEP_SUMMARY
            aws ecr describe-images \
              --repository-name "${{ env.ECR_REPOSITORY }}" \
              --query 'sort_by(imageDetails, &imagePushedAt) | reverse(@) | [*].imageTags' \
              --output json \
            | jq -r '.[] | .[] | select(. != null and (test("^[0-9a-f]{40}$")))' \
            | head -5 \
            | while read tag; do
                if [[ "$tag" == "$CURRENT" ]]; then
                  echo "- \`${tag}\` ← **auto-selected (currently in dev)**" >> $GITHUB_STEP_SUMMARY
                else
                  echo "- \`${tag}\`" >> $GITHUB_STEP_SUMMARY
                fi
              done

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> To promote a different build, re-run with **Override source tag** set." >> $GITHUB_STEP_SUMMARY

          else
            # UAT ← qa, PRD ← uat

            # Read current deployed tag from deployments.json
            CURRENT=$(jq -r --arg e "$SOURCE_ENV" '.[$e]' deployments.json)

            # List last 5 tags from ECR for the source environment
            echo "### Available ${SOURCE_ENV} tags (latest first)" >> $GITHUB_STEP_SUMMARY

            aws ecr describe-images \
              --repository-name "${{ env.ECR_REPOSITORY }}" \
              --query 'sort_by(imageDetails, &imagePushedAt) | reverse(@) | [*].imageTags' \
              --output json \
            | jq -r ".[] | .[] | select(. != null and contains(\"-${SOURCE_ENV}\"))" \
            | head -5 \
            | while read tag; do
                if [[ "$tag" == "$CURRENT" ]]; then
                  echo "- \`${tag}\` ← **auto-selected (currently in ${SOURCE_ENV})**" >> $GITHUB_STEP_SUMMARY
                else
                  echo "- \`${tag}\`" >> $GITHUB_STEP_SUMMARY
                fi
              done

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> To promote a different version, re-run with **Override source tag** set." >> $GITHUB_STEP_SUMMARY

            SOURCE_TAG="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${CURRENT}"
          fi

          echo "source_tag=${SOURCE_TAG}" >> $GITHUB_OUTPUT

  promote:
    needs: discover
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}   # approval gate
    permissions:
      contents: write
      id-token: write

    outputs:
      versioned_tag: ${{ steps.retag.outputs.versioned_tag }}
      version:       ${{ steps.retag.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull source image
        run: docker pull "${{ needs.discover.outputs.source_tag }}"

      - name: Retag and push
        id: retag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y.%m.%d')
          VERSION="${DATE}-${SHORT_SHA}-${{ inputs.target_env }}"

          REGISTRY="${{ steps.ecr_login.outputs.registry }}"
          VERSIONED="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${VERSION}"
          ENV_LATEST="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${{ inputs.target_env }}-latest"

          docker tag "${{ needs.discover.outputs.source_tag }}" "$VERSIONED"
          docker tag "${{ needs.discover.outputs.source_tag }}" "$ENV_LATEST"
          docker push "$VERSIONED"
          docker push "$ENV_LATEST"

          echo "versioned_tag=${VERSIONED}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}"         >> $GITHUB_OUTPUT

          echo "### Promoted image" >> $GITHUB_STEP_SUMMARY
          echo "- **Source:**        \`${{ needs.discover.outputs.source_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Versioned tag:** \`${VERSIONED}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Env pointer:**   \`${ENV_LATEST}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:**   ${{ inputs.target_env }}" >> $GITHUB_STEP_SUMMARY

      - name: Create Git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.retag.outputs.version }}"
          git push origin "${{ steps.retag.outputs.version }}"

      - name: Create GitHub Release (prd only)
        if: inputs.target_env == 'prd'
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: "${{ steps.retag.outputs.version }}"
          name: "${{ steps.retag.outputs.version }}"
          generate_release_notes: true
          make_latest: true
          body: |
            ## Docker image
            ```
            ${{ steps.retag.outputs.versioned_tag }}
            ```
            **Promoted from:** `${{ needs.discover.outputs.source_tag }}`

  deploy:
    needs: promote
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy.yml
    with:
      environment: ${{ inputs.target_env }}
      image_tag: ${{ needs.promote.outputs.versioned_tag }}
    secrets: inherit

  update-deployment-record:
    needs: [promote, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update deployment record
        run: |
          jq --arg env "${{ inputs.target_env }}" \
             --arg v   "${{ needs.promote.outputs.version }}" \
             '.[$env] = $v' deployments.json > tmp.json && mv tmp.json deployments.json

      - name: Commit deployments.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments.json
          git diff --cached --quiet || git commit -m "chore: deploy ${{ needs.promote.outputs.version }} to ${{ inputs.target_env }}"
          git push
